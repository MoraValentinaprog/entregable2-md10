<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Documentales</title>
</head>
<body>
    <h1>Catálogo de Documentales</h1>
    <hr>
    <ul>
        {% for doc in documentales %}
            <li><strong>{{ doc.titulo }}</strong> - {{ doc.tematica }} ({{ doc.anio_estreno }})</li>
        {% empty %}
            <li>No hay documentales cargados todavía. Entrá al panel de admin para agregar el primero.</li>
        {% endfor %}
    </ul>
</body>
</html>
