<h1>Mi Blog</h1>
<a href="{% url 'post_create' %}">Crear Nuevo Post</a>
<hr>
{% for post in posts %}
    <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
    <p>Por {{ post.author }} el {{ post.published_date|date:"d M Y" }}</p>
    <a href="{% url 'post_update' post.pk %}">Editar</a> | 
    <a href="{% url 'post_delete' post.pk %}">Eliminar</a>
{% empty %}
    <p>No hay posts publicados todavía.</p>
{% endfor %}
